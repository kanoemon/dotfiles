[[plugins]]
repo = 'scrooloose/nerdtree'
hook_add = '''
    nnoremap [nerdtree]    <Nop>
    nmap     <Space>n [nerdtree]
    nnoremap <silent>[nerdtree]n :NERDTreeToggle<CR>
    nnoremap <silent>[nerdtree]f :NERDTreeFind<CR>
'''

[[plugins]]
repo = 'Shougo/denite.nvim'
on_cmd = ['Denite']
hook_add = '''
    let g:python3_host_prog = expand('/usr/local/bin/python')
    let g:unite_enable_start_insert=0

    nmap <Space>d [denite]
    nnoremap <silent> [denite]h :<C-u>Denite file_mru<CR>
    nnoremap <silent> [denite]g  :<C-u>Denite grep -buffer-name=search-buffer-denite<CR>
    nnoremap <silent> [denite]r :<C-u>Denite -resume -buffer-name=search-buffer-denite<CR>
    nnoremap <silent> [denite]f :<C-u>Denite file_rec<CR>
    nnoremap <silent> [denite]l :<C-u>Denite line<CR>
'''
hook_post_source = '''
call denite#custom#var('file_rec', 'command', ['ag', '--follow', '--nocolor', '--nogroup', '-g', ''])
call denite#custom#var('grep', 'command', ['ag'])
call denite#custom#var('grep', 'recursive_opts', [])
call denite#custom#var('grep', 'pattern_opt', [])
call denite#custom#var('grep', 'default_opts', ['--follow', '--no-group', '--no-color'])
'''

[[plugins]]
repo ='thinca/vim-quickrun'
hook_add = '''
    nnoremap <silent><Space>r :QuickRun<CR>
    nnoremap <expr><silent> <C-c> quickrun#is_running() ? quickrun#sweep_sessions() : "\<C-c>"
'''
hook_source = '''
au FileType qf nnoremap <silent><buffer>q :quit<CR>
let g:quickrun_config = {
    \'_' : {
    \   'outputter/buffer/split' : ':botright 8sp',
    \   'outputter/error/success' : 'buffer',
    \   'outputter/error/error'   : 'quickfix',
    \   'outputter/buffer/into' : '1',
    \   'outputter/quickfix/errorformat' : '%f:%l,%m in %f on line %l',
    \   'outputter/buffer/close_on_empty' : 1,
    \   'outputter' : 'error',
    \},
    \}
'''

[[plugins]]
repo = 'Shougo/neosnippet.vim'
on_event = 'InsertCharPre'

[[plugins]]
repo = 'Shougo/neosnippet-snippets'
on_event = 'InsertCharPre'
on_ft = 'snippet'
hook_add = '''
    let g:neosnippet#enable_snipmate_compatibility = 1
    let g:neosnippet#snippets_directory=$XDG_CONFIG_HOME . '/nvim/snippets'
'''

[[plugins]]
repo = 'itchyny/lightline.vim'
hook_add = '''
    set laststatus=2
    set t_Co=256
let g:lightline = {
      \ 'colorscheme': 'solarized',
      \ 'active': {
      \   'left': [ [ 'mode', 'paste' ],
      \             [ 'fugitive', 'filename' ] ]
      \ },
      \ 'component_function': {
      \   'fugitive': 'LightlineFugitive',
      \   'readonly': 'LightlineReadonly',
      \   'modified': 'LightlineModified',
      \   'filename': 'LightlineFilename'
      \ },
      \ 'separator': { 'left': '⮀', 'right': '⮂' },
      \ 'subseparator': { 'left': '⮁', 'right': '⮃' }
      \ }

function! LightlineModified()
  if &filetype == "help"
    return ""
  elseif &modified
    return "+"
  elseif &modifiable
    return ""
  else
    return ""
  endif
endfunction

function! LightlineReadonly()
  if &filetype == "help"
    return ""
  elseif &readonly
    return "⭤"
  else
    return ""
  endif
endfunction

function! LightlineFugitive()
  return exists('*fugitive#head') ? fugitive#head() : ''
endfunction

function! LightlineFilename()
  return ('' != LightlineReadonly() ? LightlineReadonly() . ' ' : '') .
       \ ('' != expand('%:t') ? expand('%:t') : '[No Name]') .
       \ ('' != LightlineModified() ? ' ' . LightlineModified() : '')
endfunction
'''
